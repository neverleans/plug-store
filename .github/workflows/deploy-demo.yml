name: Deploy demo to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Allow one concurrent deployment, and let a running one finish rather than
# leaving the Pages site half-published.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages and demo
        run: pnpm build
        env:
          # Project sites live at https://<user>.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Add SPA fallback
        # GitHub Pages has no rewrite rules, so a deep link such as /products
        # would 404. Serving the same shell as 404.html hands control to the router.
        run: cp apps/demo/dist/index.html apps/demo/dist/404.html

      - name: Disable Jekyll processing
        run: touch apps/demo/dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
